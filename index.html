<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>拼贴诗生成器</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1>拼贴诗生成器</h1>

<textarea id="input">
事到如今已经 无所谓了
不舍昼夜 创造 没有用的东西
 以 反抗社会化
</textarea>

<div class="toolbar">

<label>背景：</label>

<select id="backgroundMode">
    <option value="paper">随机纸纹</option>
    <option value="color">自选颜色</option>
</select>

<input
    type="color"
    id="bgColor"
    value="#f4efe3">

<label>纸片：</label>

<select id="palette">

    <option value="paper">纸纹</option>

    <option value="random">混合</option>

    <option value="blue">蓝</option>

    <option value="green">绿</option>

    <option value="pink">粉</option>

    <option value="brown">棕</option>

    <option value="gray">灰</option>
      
    <option value="yellow">黄</option>

    <option value="pinkgreen">粉绿</option>

    <option value="orangegreen">橙绿</option>

    <option value="blueyellow">蓝黄</option>

    <option value="whatisthis"selected>这是什么？</option>

    <option value="randomplus">完全随机</option>

</select>

<button onclick="generate()">
生成一下!
</button>

<button onclick="downloadPNG()">
导出PNG
</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>

</body>

</html>
