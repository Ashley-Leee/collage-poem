<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>拼贴诗生成器</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1>拼贴诗生成器</h1>

<textarea id="input">
输入 文字 点击 生成
      得到 看起来
像 诗 一样 和
      请 支持
      育才仙宗
</textarea>

<div class="toolbar">

<label>背景：</label>

<select id="backgroundMode">
    <option value="paper">纸纹背景</option>
    <option value="color">自定义颜色</option>
</select>

<input
    type="color"
    id="bgColor"
    value="#f4efe3">

<label>纸片：</label>

<select id="palette">

    <option value="paper">纸纹</option>

    <option value="random">混合</option>

    <option value="blue">蓝</option>

    <option value="green">绿</option>

    <option value="pink">粉</option>

    <option value="brown">棕</option>

    <option value="gray">灰</option>

</select>

<button onclick="generate()">
生成一下!
</button>

<button onclick="downloadPNG()">
导出PNG
</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>

</body>

</html>
