<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1">

<title>拼贴诗生成器</title>

<link rel="stylesheet" href="style.css">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

</head>

<body>

<h1>拼贴诗生成器</h1>

<textarea id="input">
输入 文字 点击 生成
      得到 看起来
像 诗 一样 和
      请 支持
      育才仙宗
</textarea>

<div class="toolbar">

<label>背景颜色：</label>
<input type="color"
       id="bgColor"
       value="#f3efe4">

<label>纸片颜色：</label>

<select id="palette">
    <option value="blue">Retro Blue</option>
    <option value="green">Retro Green</option>
    <option value="pink">Retro Pink</option>
    <option value="orange">Retro Orange</option>
    <option value="random" selected>Random</option>
</select>

<button onclick="generate()">
重新排版
</button>

<button onclick="downloadPNG()">
导出PNG
</button>

</div>

<div id="canvas"></div>

<script src="script.js"></script>

</body>
</html>
